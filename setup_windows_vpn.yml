---
- name: Windows Server 하이브리드 완전 자동화 프로비저닝 (BGP 전환)
  hosts: windows_server
  gather_facts: yes
  vars:
    aws_vpc_cidr: "10.1.0.0/16"
    onprem_asn: 65000         # 윈도우 서버 측 ASN (테라폼의 var.onprem_asn 값과 일치해야 함)
    aws_asn: 64512            # AWS TGW 측 ASN (테라폼의 var.aws_asn 값과 일치해야 함)
    bgp_peer_ip: "169.254.127.125"  # AWS 터널1 내부(Inside) BGP IP
    bgp_local_ip: "169.254.127.126" # 윈도우 터널1 내부(Inside) BGP IP
    local_lan_ip: "192.168.0.23"    # 윈도우 서버 실제 IP (라우터 식별자)

  tasks:
    # ---------------------------------------------------------
    # 1. RRAS 구성 (인프라 엔진 준비)
    # ---------------------------------------------------------
    - name: 1. Windows Server에 RRAS 설치
      ansible.windows.win_feature:
        name: Routing
        state: present
        include_management_tools: yes
      register: rras_install

    - name: 1-1. 필요시 자동 재부팅
      ansible.windows.win_reboot:
      when: rras_install.reboot_required

    - name: 1-2. RRAS 서비스 활성화 및 시작
      ansible.windows.win_service:
        name: RemoteAccess
        state: started
        start_mode: auto

    # ---------------------------------------------------------
    # 2. VPN 멱등성 및 연결 (BGP용)
    # ---------------------------------------------------------
    - name: 2. 기존 VPN 및 찌꺼기 제거 (Cleanup)
      ansible.windows.win_shell: |
        # 1. VPN 삭제
        $iface = Get-VpnS2SInterface -Name "AWS-TGW-Tunnel1" -ErrorAction SilentlyContinue
        if ($iface) {
            if ($iface.ConnectionState -eq "Connected") {
                Disconnect-VpnS2SInterface -Name "AWS-TGW-Tunnel1" -Confirm:$false -Force
                Start-Sleep -Seconds 2
            }
            Remove-VpnS2SInterface -Name "AWS-TGW-Tunnel1" -Force
        }
        # 2. (BGP 전환을 위해) 기존 정적 라우팅 확실히 삭제
        if (Get-NetRoute -DestinationPrefix "{{ aws_vpc_cidr }}" -ErrorAction SilentlyContinue) {
            Remove-NetRoute -DestinationPrefix "{{ aws_vpc_cidr }}" -Confirm:$false
        }
      ignore_errors: yes

    - name: 2-1. VPN 인터페이스 생성 및 강제 연결
      ansible.windows.win_shell: |
        Add-VpnS2SInterface -Name "AWS-TGW-Tunnel1" `
                            -Destination "{{ tunnel1_ip }}" `
                            -AuthenticationMethod PSKOnly `
                            -SharedSecret "{{ tunnel1_psk }}" `
                            -IPv4Subnet "{{ aws_vpc_cidr }}:10" `
                            -Protocol IKEv2
        
        for($i=0; $i -lt 3; $i++) {
            Connect-VpnS2SInterface -Name "AWS-TGW-Tunnel1"
            Start-Sleep -Seconds 5
            if ((Get-VpnS2SInterface -Name "AWS-TGW-Tunnel1").ConnectionState -eq "Connected") { break }
        }

    # ---------------------------------------------------------
    # 3. ★ [신규] BGP 동적 라우팅 구성 ★
    # ---------------------------------------------------------
    - name: 3-1. Windows BGP 라우터 활성화 (BgpIdentifier 지정)
      ansible.windows.win_shell: |
        $router = Get-BgpRouter -ErrorAction SilentlyContinue
        if ($router) {
            # 이미 있으면 설정만 덮어쓰기
            Set-BgpRouter -BgpIdentifier "{{ local_lan_ip }}" -LocalASN {{ onprem_asn }} -Force
        } else {
            # 없으면 새로 생성
            Add-BgpRouter -BgpIdentifier "{{ local_lan_ip }}" -LocalASN {{ onprem_asn }} -Force
        }
        # BGP 라우터가 온프레미스 대역(집)을 AWS로 전파하도록 선언
        Add-BgpCustomRoute -Network "192.168.0.0/24" -ErrorAction SilentlyContinue

    - name: 3-2. AWS TGW BGP 피어(Peer) 등록 및 연결
      ansible.windows.win_shell: |
        $peerName = "AWS-TGW-Peer1"
        $peerIp = "{{ bgp_peer_ip }}"
        
        # 1. IP가 겹치는 '좀비 피어' 강제 삭제 (Name -> PeerName 으로 수정)
        $conflictPeers = Get-BgpPeer -ErrorAction SilentlyContinue | Where-Object { $_.PeerIPAddress -eq $peerIp }
        if ($conflictPeers) {
            foreach ($p in $conflictPeers) {
                Remove-BgpPeer -Name $p.PeerName -Force
            }
        }
        
        # 2. 이름이 겹치는 피어도 확실히 삭제
        $namePeer = Get-BgpPeer -Name $peerName -ErrorAction SilentlyContinue
        if ($namePeer) {
            Remove-BgpPeer -Name $peerName -Force
        }
        
        # 3. 깨끗해진 상태에서 새 피어 완벽 등록
        Add-BgpPeer -Name $peerName `
                    -LocalIPAddress "{{ bgp_local_ip }}" `
                    -PeerIPAddress $peerIp `
                    -PeerASN {{ aws_asn }}
        
        # 피어 연결 강제 시도
        Start-BgpPeer -Name $peerName -ErrorAction SilentlyContinue
      register: bgp_result
      changed_when: bgp_result.rc == 0

    # ---------------------------------------------------------
    # 4. AWS SSM Agent (하이브리드 활성화)
    # ---------------------------------------------------------
    - name: 4. SSM Agent 설치 및 자동 응답 등록
      ansible.windows.win_shell: |
        $url = "https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/windows_amd64/AmazonSSMAgentSetup.exe"
        $path = "$env:TEMP\AmazonSSMAgentSetup.exe"
        if (!(Test-Path $path)) { (New-Object System.Net.WebClient).DownloadFile($url, $path) }
        Start-Process $path -ArgumentList "/S" -Wait
        
        cd "C:\Program Files\Amazon\SSM"
        echo "y" | .\amazon-ssm-agent.exe -register -code "{{ ssm_code }}" -id "{{ ssm_id }}" -region "ap-northeast-2"
      register: ssm_reg

    - name: 4-1. SSM 서비스 상태 보장
      ansible.windows.win_service:
        name: AmazonSSMAgent
        state: restarted
        start_mode: auto

    # ---------------------------------------------------------
    # 5. Zero Trust (보안 마무리)
    # ---------------------------------------------------------
    - name: 5. [Zero Trust] WinRM 포트 폐쇄 (비동기 처리)
      community.windows.win_firewall_rule:
        name: "Block-WinRM-After-Setup"
        localport: 5985
        action: block
        direction: in
        protocol: tcp
        state: present
        enabled: yes
      async: 15
      poll: 0
      ignore_errors: yes