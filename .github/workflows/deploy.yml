name: Hybrid Cloud DR Provisioning

on:
  push:
    branches: [ "main" ]

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  deploy-infra-and-configure:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Terraform 설치
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Terraform 초기화 및 배포
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Terraform Output 추출 및 환경 변수 등록
        working-directory: ./terraform
        run: |
          # 1. 상태(Online) 대기 시간을 무시하고, 온프레미스 노드(mi-*) ID 강제 추출
          RAW_ID=$(aws ssm describe-instance-information --query "InstanceInformationList[?starts_with(InstanceId, 'mi-')].InstanceId | [0]" --output text)
          
          # 2. AWS CLI 특유의 눈에 보이지 않는 줄바꿈(\r\n) 완벽 제거 (오류의 핵심 원인 해결)
          INSTANCE_ID=$(echo "$RAW_ID" | tr -d '\r\n')
          
          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" == "null" ]; then
            echo "❌ 오류: 온프레미스 SSM 노드를 찾을 수 없습니다."
            exit 1
          fi
          
          echo "✅ 타겟 인스턴스 인식 성공: $INSTANCE_ID"
          
          # 3. 모든 테라폼 출력값에서도 줄바꿈 문자를 제거하여 GITHUB_ENV 포맷 파괴 원천 차단
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "TUNNEL1_IP=$(terraform output -raw vpn_tunnel1_ip | tr -d '\r\n')" >> $GITHUB_ENV
          echo "TUNNEL1_PSK=$(terraform output -raw vpn_tunnel1_psk | tr -d '\r\n')" >> $GITHUB_ENV
          echo "BGP_PEER1_IP=$(terraform output -raw vpn_bgp_peer1_ip | tr -d '\r\n')" >> $GITHUB_ENV
          echo "BGP_LOCAL1_IP=$(terraform output -raw vpn_bgp_local1_ip | tr -d '\r\n')" >> $GITHUB_ENV
          echo "TUNNEL2_IP=$(terraform output -raw vpn_tunnel2_ip | tr -d '\r\n')" >> $GITHUB_ENV
          echo "TUNNEL2_PSK=$(terraform output -raw vpn_tunnel2_psk | tr -d '\r\n')" >> $GITHUB_ENV
          echo "BGP_PEER2_IP=$(terraform output -raw vpn_bgp_peer2_ip | tr -d '\r\n')" >> $GITHUB_ENV
          echo "BGP_LOCAL2_IP=$(terraform output -raw vpn_bgp_local2_ip | tr -d '\r\n')" >> $GITHUB_ENV

      - name: AWS SSM으로 Windows 설정 스크립트 전송 및 대기
        run: |
          cat <<EOF > final_script.ps1
          \$AwsVpcCidr = "10.1.0.0/16"
          \$OnpremVpcCidr = "192.168.0.0/24"
          \$Tunnel1Ip = "${{ env.TUNNEL1_IP }}"
          \$Tunnel1Psk = "${{ env.TUNNEL1_PSK }}"
          \$BgpPeer1Ip = "${{ env.BGP_PEER1_IP }}"
          \$BgpLocal1Ip = "${{ env.BGP_LOCAL1_IP }}"
          
          \$Tunnel2Ip = "${{ env.TUNNEL2_IP }}"
          \$Tunnel2Psk = "${{ env.TUNNEL2_PSK }}"
          \$BgpPeer2Ip = "${{ env.BGP_PEER2_IP }}"
          \$BgpLocal2Ip = "${{ env.BGP_LOCAL2_IP }}"
          EOF
          
          cat ./scripts/vpn_bgp_setup.ps1 >> final_script.ps1
          
          B64_SCRIPT=$(cat final_script.ps1 | base64 -w 0)
          
          EXEC_CMD="[System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String('$B64_SCRIPT')) | Invoke-Expression"
          
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunPowerShellScript" \
            --targets "Key=instanceids,Values=${{ env.INSTANCE_ID }}" \
            --parameters "commands=[\"$EXEC_CMD\"]" \
            --query "Command.CommandId" \
            --output text)
            
          echo "명령 전송 완료. Command ID: $COMMAND_ID"
          
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${{ env.INSTANCE_ID }}"